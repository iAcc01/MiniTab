name: Build & Release Chrome Extension

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Chrome Extension
        run: npm run build:crx

      - name: Create ZIP
        run: cd dist && zip -r ../mini-tab-extension.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: mini-tab-extension.zip
          generate_release_notes: true
          body: |
            ## 安装方式

            1. 下载 `mini-tab-extension.zip`
            2. 解压到一个文件夹
            3. 打开 Chrome，访问 `chrome://extensions/`
            4. 开启右上角「开发者模式」
            5. 点击「加载已解压的扩展程序」
            6. 选择解压后的文件夹
